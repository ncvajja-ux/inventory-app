<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Detail</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --ink:#0f0f0f; --muted:#6b7280; --accent:#c8973a; --accent2:#f0e6d0;
            --bg:#faf9f7; --card:#ffffff; --border:#e5e2db; --sidebar:#141414;
            --danger:#dc2626; --success:#16a34a; --info:#0369a1; --warning:#d97706;
        }

        /* ── Screen layout ── */
        body { font-family:'DM Sans',sans-serif; background:var(--bg); min-height:100vh; color:var(--ink); }
        .topbar { background:white; border-bottom:1px solid var(--border); padding:0 40px; height:64px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
        .topbar-left { display:flex; align-items:center; gap:16px; }
        .back-btn { display:flex; align-items:center; gap:8px; padding:8px 14px; border:1.5px solid var(--border); border-radius:8px; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; background:white; text-decoration:none; transition:all 0.2s; }
        .back-btn:hover { border-color:var(--ink); color:var(--ink); }
        .page-title { font-family:'DM Serif Display',serif; font-size:20px; }
        .topbar-actions { display:flex; gap:10px; align-items:center; }

        .content { max-width:900px; margin:0 auto; padding:36px 40px; }

        /* ── Status banner ── */
        .status-bar { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-radius:12px; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
        .status-bar.pending  { background:#fef9c3; border:1px solid #fde68a; }
        .status-bar.paid     { background:#dcfce7; border:1px solid #bbf7d0; }
        .status-bar.partial  { background:#dbeafe; border:1px solid #bfdbfe; }
        .status-bar.cancelled{ background:#fee2e2; border:1px solid #fecaca; }
        .status-label { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; }
        .status-bar.pending  .status-label { color:#854d0e; }
        .status-bar.paid     .status-label { color:#15803d; }
        .status-bar.partial  .status-label { color:#1d4ed8; }
        .status-bar.cancelled .status-label { color:var(--danger); }
        .payment-controls { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

        /* ── Cards ── */
        .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px 28px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
        .card-title { font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:16px; }
        .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .info-field label { font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:3px; }
        .info-field span  { font-size:14px; }
        .mono { font-family:'Courier New',monospace; font-size:12px; background:var(--accent2); color:#92650a; padding:2px 8px; border-radius:4px; }

        /* ── Line items table ── */
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; font-size:13px; min-width:700px; }
        thead th { padding:10px 12px; text-align:left; font-size:11px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); background:var(--bg); white-space:nowrap; }
        thead th.right { text-align:right; }
        tbody tr { border-bottom:1px solid var(--border); }
        tbody tr:last-child { border-bottom:none; }
        tbody tr:hover { background:#fdf8f2; }
        tbody td { padding:12px; vertical-align:middle; }
        tbody td.right { text-align:right; }
        .gst-pill { display:inline-block; background:#dcfce7; color:#15803d; border-radius:10px; padding:1px 7px; font-size:11px; font-weight:600; }

        /* ── Totals ── */
        .totals-wrap { display:flex; justify-content:flex-end; margin-top:4px; }
        .totals-box { min-width:300px; }
        .totals-row { display:flex; justify-content:space-between; padding:8px 0; font-size:14px; border-bottom:1px solid var(--border); }
        .totals-row:last-child { border-bottom:none; }
        .totals-row.grand { font-size:18px; font-weight:700; padding-top:12px; }
        .totals-row.muted  { color:var(--muted); font-size:13px; }
        .totals-row.disc   { color:var(--danger); font-size:13px; }

        /* ── Buttons ── */
        .btn { padding:9px 20px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; border:none; transition:all 0.2s; }
        .btn-primary  { background:var(--accent);  color:white; }
        .btn-primary:hover  { background:#b5852e; }
        .btn-success  { background:var(--success); color:white; }
        .btn-success:hover  { background:#15803d; }
        .btn-danger   { background:#fee2e2; color:var(--danger); }
        .btn-danger:hover   { background:var(--danger); color:white; }
        .btn-ghost    { background:transparent; color:var(--muted); border:1.5px solid var(--border); }
        .btn-ghost:hover    { border-color:var(--ink); color:var(--ink); }
        .btn-print    { background:white; border:1.5px solid var(--border); color:var(--ink); }
        .btn-print:hover    { border-color:var(--accent); color:var(--accent); }

        /* ── Partial payment input ── */
        .partial-row { display:flex; gap:8px; align-items:center; }
        .partial-row input { padding:8px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:13px; width:140px; font-family:'DM Sans',sans-serif; outline:none; }
        .partial-row input:focus { border-color:var(--accent); }

        /* ── Loading / error ── */
        .center-state { text-align:center; padding:80px 40px; color:var(--muted); }
        .center-state .state-icon { font-size:48px; margin-bottom:16px; }
        .spinner { display:inline-block; width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ── Toast ── */
        #toast { position:fixed; bottom:32px; right:32px; padding:14px 22px; border-radius:10px; font-size:14px; font-weight:500; color:white; opacity:0; transform:translateY(12px); transition:all 0.3s ease; z-index:999; pointer-events:none; }
        #toast.show { opacity:1; transform:translateY(0); }
        #toast.success { background:var(--success); }
        #toast.error   { background:var(--danger); }
        #toast.info    { background:var(--info); }

        /* ══════════════════════════════════════════════════
           PRINT STYLES — clean GST invoice layout
        ══════════════════════════════════════════════════ */
        @media print {
            body { background:white; }
            .topbar, .status-bar, .no-print { display:none !important; }
            .content { max-width:100%; padding:0; margin:0; }
            .card { box-shadow:none; border:1px solid #ddd; page-break-inside:avoid; }
            .print-header { display:block !important; }
            table { min-width:auto; }
            .btn-print { display:none; }
        }

        /* Print header (hidden on screen, shown on print) */
        .print-header {
            display:none;
            border-bottom:2px solid var(--ink);
            padding-bottom:16px;
            margin-bottom:24px;
        }
        .print-header .store-name { font-family:'DM Serif Display',serif; font-size:28px; }
        .print-header .store-meta { font-size:12px; color:var(--muted); margin-top:4px; }
        .print-invoice-title { font-size:20px; font-weight:700; text-align:right; }
    </style>
</head>
<body>

<!-- Top bar (hidden on print) -->
<div class="topbar no-print">
    <div class="topbar-left">
        <a class="back-btn" href="Sales.html?tab=orders">← All Orders</a>
        <span class="page-title">Order Detail</span>
    </div>
    <div class="topbar-actions">
        <button class="btn btn-print" onclick="window.print()">🖨️ Print / Save PDF</button>
    </div>
</div>

<!-- Loading state -->
<div class="content" id="loadingState">
    <div class="center-state">
        <span class="spinner"></span>
        <p style="margin-top:16px;">Loading order…</p>
    </div>
</div>

<!-- Main content (hidden until loaded) -->
<div class="content" id="mainContent" style="display:none;">

    <!-- Print header (only visible when printing) -->
    <div class="print-header" id="printHeader">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div>
                <div class="store-name">Store Manager</div>
                <div class="store-meta" id="printStoreInfo">Hyderabad, Telangana</div>
            </div>
            <div style="text-align:right;">
                <div class="print-invoice-title">TAX INVOICE</div>
                <div style="font-family:'Courier New',monospace;font-size:13px;margin-top:4px;" id="printOrderId"></div>
                <div style="font-size:12px;color:var(--muted);" id="printOrderDate"></div>
            </div>
        </div>
    </div>

    <!-- Return banner (only shown for R orders) -->
    <div id="returnBanner" style="display:none;align-items:center;gap:16px;padding:14px 20px;background:#fee2e2;border:1px solid #fecaca;border-radius:12px;margin-bottom:16px;flex-wrap:wrap;" class="no-print">
        <span style="font-size:20px;">↩️</span>
        <div>
            <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--danger);">RETURN ORDER</div>
            <div style="font-size:13px;color:var(--danger);margin-top:2px;" id="retBannerRef"></div>
        </div>
        <div style="background:white;border:1px solid #fecaca;border-radius:8px;padding:6px 14px;font-size:13px;" id="retBannerReason"></div>
    </div>

    <!-- Status banner -->
    <div class="status-bar" id="statusBar">
        <div>
            <div class="status-label" id="statusLabel">PENDING</div>
            <div style="font-size:13px;margin-top:2px;" id="statusSub"></div>
        </div>
        <div class="payment-controls no-print" id="paymentControls"></div>
    </div>

    <!-- Customer + Order info -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
        <div class="card">
            <div class="card-title">Customer</div>
            <div class="info-grid" id="customerInfo"></div>
        </div>
        <div class="card">
            <div class="card-title">Order Info</div>
            <div class="info-grid" id="orderInfo"></div>
        </div>
    </div>

    <!-- Line items -->
    <div class="card">
        <div class="card-title">Line Items</div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Product</th>
                        <th>Details</th>
                        <th class="right">MRP</th>
                        <th class="right">Disc %</th>
                        <th class="right">Price</th>
                        <th class="right">GST</th>
                        <th class="right">Qty</th>
                        <th class="right">Line Total</th>
                    </tr>
                </thead>
                <tbody id="lineItems"></tbody>
            </table>
        </div>

        <!-- Totals -->
        <div class="totals-wrap" style="margin-top:20px;">
            <div class="totals-box">
                <div class="totals-row muted"><span>Subtotal (ex-GST)</span><span id="tSubtotal">—</span></div>
                <div class="totals-row muted"><span>GST</span><span id="tGst">—</span></div>
                <div class="totals-row disc" id="tDiscRow" style="display:none;"><span>Customer Discount</span><span id="tDisc">—</span></div>
                <div class="totals-row grand"><span>Grand Total</span><span id="tGrand">—</span></div>
                <div class="totals-row muted" id="tPaidRow" style="display:none;"><span>Amount Paid</span><span id="tPaid">—</span></div>
                <div class="totals-row" id="tBalRow" style="display:none;"><span style="font-weight:600;">Balance Due</span><span id="tBal" style="font-weight:600;color:var(--danger);">—</span></div>
            </div>
        </div>
    </div>

</div><!-- /mainContent -->

<div id="toast"></div>

<script>
    const fmt  = n  => '₹' + parseFloat(n||0).toFixed(2);
    const fmtD = s  => s ? new Date(s).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—';

    let orderData   = null;
    let orderId     = null;

    function showToast(msg, type='success') {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = `show ${type}`;
        setTimeout(() => t.className = '', 3200);
    }

    // ── Load order ────────────────────────────────────────────────────────────
    async function loadOrder() {
        const params = new URLSearchParams(window.location.search);
        orderId      = params.get('order_id');

        if (!orderId) {
            document.getElementById('loadingState').innerHTML = `
                <div class="center-state">
                    <div class="state-icon">❌</div>
                    <p>No order ID provided.</p>
                    <a href="Sales.html" style="color:var(--accent);font-weight:600;margin-top:12px;display:inline-block;">← Back to Sales</a>
                </div>`;
            return;
        }

        document.title = `Order ${orderId}`;

        try {
            const res  = await fetch(`/orders/${orderId}`);
            if (!res.ok) throw new Error('Order not found');
            orderData  = await res.json();
            renderOrder(orderData);
        } catch(err) {
            document.getElementById('loadingState').innerHTML = `
                <div class="center-state">
                    <div class="state-icon">😕</div>
                    <p>${err.message}</p>
                    <a href="Sales.html?tab=orders" style="color:var(--accent);font-weight:600;margin-top:12px;display:inline-block;">← Back to Orders</a>
                </div>`;
        }
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function renderOrder(o) {
        document.getElementById('loadingState').style.display  = 'none';
        document.getElementById('mainContent').style.display   = 'block';

        // Print header
        document.getElementById('printOrderId').textContent   = `Order #${o.order_id}`;
        document.getElementById('printOrderDate').textContent = `Date: ${fmtD(o.created_at)}`;

        // Return order — add red banner above status
        const isReturn = o.order_type === 'R';
        const retBanner = document.getElementById('returnBanner');
        if (retBanner) {
            if (isReturn) {
                retBanner.style.display = 'flex';
                document.getElementById('retBannerRef').textContent =
                    o.original_order_id ? 'Return against ' + o.original_order_id : 'Unlinked Return';
                document.getElementById('retBannerReason').textContent = o.return_reason || '';
            } else {
                retBanner.style.display = 'none';
            }
        }

        // Status bar
        renderStatusBar(o, isReturn);

        // Customer info
        document.getElementById('customerInfo').innerHTML = `
            <div class="info-field"><label>Name</label><span><strong>${o.name||'—'}</strong></span></div>
            <div class="info-field"><label>KUNNR</label><span class="mono">${o.kunnr}</span></div>
            ${o.number  ? `<div class="info-field"><label>Phone</label><span>${o.number}</span></div>` : ''}
            ${o.email   ? `<div class="info-field"><label>Email</label><span>${o.email}</span></div>`  : ''}
            ${o.gstin   ? `<div class="info-field" style="grid-column:1/-1"><label>GSTIN</label><span>${o.gstin}</span></div>` : ''}
            ${o.address ? `<div class="info-field" style="grid-column:1/-1"><label>Address</label><span>${o.address}</span></div>` : ''}
        `;

        // Order info
        document.getElementById('orderInfo').innerHTML = `
            <div class="info-field"><label>Order ID</label><span class="mono">${o.order_id}</span></div>
            <div class="info-field"><label>Order Date</label><span>${fmtD(o.created_at)}</span></div>
            <div class="info-field"><label>Status</label><span>${o.status}</span></div>
            <div class="info-field"><label>Payment</label><span>${paymentBadge(o.payment_status)}</span></div>
            ${o.customer_discount_pct > 0 ? `<div class="info-field"><label>Customer Discount</label><span>${o.customer_discount_pct}%</span></div>` : ''}
            ${o.paid_amount > 0 ? `<div class="info-field"><label>Amount Paid</label><span><strong>${fmt(o.paid_amount)}</strong></span></div>` : ''}
        `;

        // Line items
        let subtotal = 0, totalGst = 0;
        document.getElementById('lineItems').innerHTML = (o.items||[]).map((item, idx) => {
            const mrp       = parseFloat(item.mrp || item.price || 0);
            const discPct   = parseFloat(item.discount_pct || 0);
            const gstRate   = parseFloat(item.gst_rate || 0);
            const gstAmt    = mrp * (gstRate / 100);
            const netPrice  = mrp * (1 - discPct / 100);
            const lineTotal = (netPrice + gstAmt) * item.quantity;
            subtotal  += netPrice * item.quantity;
            totalGst  += gstAmt  * item.quantity;
            return `<tr>
                <td style="color:var(--muted);font-size:12px;">${idx+1}</td>
                <td>
                    <div style="font-weight:600;">${item.brand||'—'}</div>
                    <span class="mono" style="font-size:11px;">${item.matnr}</span>
                </td>
                <td style="font-size:12px;color:var(--muted);">${[item.category,item.subcategory,item.subsubcategory,item.size,item.color,item.fit].filter(Boolean).join(' · ')}</td>
                <td class="right">${fmt(mrp)}</td>
                <td class="right">${discPct > 0 ? `<span style="color:var(--danger);">${discPct}%</span>` : '—'}</td>
                <td class="right">${fmt(netPrice)}</td>
                <td class="right"><span class="gst-pill">${gstRate}%</span></td>
                <td class="right">${item.quantity}</td>
                <td class="right"><strong>${fmt(lineTotal)}</strong></td>
            </tr>`;
        }).join('');

        // Totals
        const custDisc = (subtotal + totalGst) * ((o.customer_discount_pct||0) / 100);
        const grand    = subtotal + totalGst - custDisc;
        const paid     = parseFloat(o.paid_amount || 0);
        const balance  = grand - paid;

        const sign = isReturn ? '-' : '';
        document.getElementById('tSubtotal').textContent = sign + fmt(subtotal);
        document.getElementById('tGst').textContent      = sign + fmt(totalGst);
        document.getElementById('tGrand').textContent    = sign + fmt(grand);
        if (isReturn) document.getElementById('tGrand').style.color = 'var(--danger)';

        if (custDisc > 0) {
            document.getElementById('tDiscRow').style.display = '';
            document.getElementById('tDisc').textContent = `−${fmt(custDisc)}`;
        }
        if (paid > 0 && o.payment_status !== 'PAID') {
            document.getElementById('tPaidRow').style.display = '';
            document.getElementById('tPaid').textContent = fmt(paid);
            document.getElementById('tBalRow').style.display  = '';
            document.getElementById('tBal').textContent  = fmt(balance);
        }
    }

    // ── Status bar ────────────────────────────────────────────────────────────
    function renderStatusBar(o, isReturn) {
        const bar     = document.getElementById('statusBar');
        const label   = document.getElementById('statusLabel');
        const sub     = document.getElementById('statusSub');
        const controls= document.getElementById('paymentControls');

        const ps = o.payment_status || 'PENDING';
        const classMap = {PENDING:'pending',PAID:'paid',PARTIALLY_PAID:'partial',CANCELLED:'cancelled'};
        bar.className = `status-bar ${classMap[ps]||'pending'}`;
        label.textContent = ps.replace('_',' ');
        sub.textContent   = ps === 'PAID' ? `Paid in full on ${fmtD(o.created_at)}` :
                            ps === 'PARTIALLY_PAID' ? `${fmt(o.paid_amount)} received — balance due` :
                            ps === 'CANCELLED' ? 'Order cancelled — stock reservation released' :
                            'Awaiting payment';

        if (ps === 'CANCELLED') { controls.innerHTML = ''; return; }
        if (isReturn) {
            controls.innerHTML =
                '<div class="partial-row"><input type="number" id="paidAmountInput" placeholder="Refund amount (₹)" min="0" step="0.01" value="'+(o.paid_amount>0?o.paid_amount:'')+'"></div>' +
                '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
                (ps!=='PAID' ? '<button class="btn btn-success" onclick="updatePayment(\'PAID\')">✅ Mark Refund Issued</button>' : '') +
                (ps==='PENDING' ? '<button class="btn btn-primary" onclick="updatePayment(\'PARTIALLY_PAID\')">💰 Partial Refund</button>' : '') +
                '</div>';
            return;
        }

        controls.innerHTML = `
            <div class="partial-row">
                <input type="number" id="paidAmountInput" placeholder="Amount paid (₹)"
                       min="0" step="0.01" value="${o.paid_amount > 0 ? o.paid_amount : ''}">
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                ${ps !== 'PAID'            ? `<button class="btn btn-success" onclick="updatePayment('PAID')">✅ Mark as Paid</button>` : ''}
                ${ps === 'PENDING'         ? `<button class="btn btn-primary" onclick="updatePayment('PARTIALLY_PAID')">💰 Partial Payment</button>` : ''}
                ${ps !== 'CANCELLED'       ? `<button class="btn btn-danger"  onclick="updatePayment('CANCELLED')">✕ Cancel Order</button>` : ''}
            </div>
        `;
    }

    function paymentBadge(ps) {
        const map = {
            PENDING:       ['#fef9c3','#854d0e','Pending'],
            PAID:          ['#dcfce7','#15803d','Paid'],
            PARTIALLY_PAID:['#dbeafe','#1d4ed8','Partial'],
            CANCELLED:     ['#fee2e2','#dc2626','Cancelled'],
        };
        const [bg,color,label] = map[ps] || map.PENDING;
        return `<span style="background:${bg};color:${color};border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;text-transform:uppercase;">${label}</span>`;
    }

    // ── Payment update ────────────────────────────────────────────────────────
    async function updatePayment(status) {
        const paidInput = document.getElementById('paidAmountInput');
        const paid      = paidInput ? parseFloat(paidInput.value) || 0 : 0;

        const confirmMsg = {
            PAID:          `Mark order ${orderId} as fully PAID?`,
            PARTIALLY_PAID:`Record partial payment of ${fmt(paid)} for order ${orderId}?`,
            CANCELLED:     `Cancel order ${orderId}?\nThis will release the stock reservation.`,
        };
        if (!confirm(confirmMsg[status])) return;

        try {
            const res  = await fetch(`/orders/${orderId}/payment`, {
                method:'PUT', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({payment_status: status, paid_amount: paid})
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);

            const msgs = {
                PAID:          `✅ Order marked as Paid — stock deducted`,
                PARTIALLY_PAID:`💰 Partial payment of ${fmt(paid)} recorded`,
                CANCELLED:     `Order cancelled — stock reservation released`,
            };
            showToast(msgs[status] || '✅ Updated');

            // Reload order
            setTimeout(() => loadOrder(), 600);
        } catch(err) { showToast(`❌ ${err.message}`, 'error'); }
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    loadOrder();
</script>
